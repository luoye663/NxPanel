name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: webapp-react/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: webapp-react

      - name: Run backend tests
        run: make test

      - name: Run backend vet
        run: make vet

      - name: Run frontend type check
        run: pnpm type-check
        working-directory: webapp-react

      - name: Build release package
        run: make release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/nxpanel-linux-amd64.tar.gz
          generate_release_notes: true

      # ── Docker 镜像构建与推送（独享模式，nginx + openresty 双变体）──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: ${{ vars.ENABLE_GHCR_PUSH == 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker Hub credentials
        if: ${{ vars.ENABLE_DOCKERHUB_PUSH == 'true' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "ENABLE_DOCKERHUB_PUSH=true requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: ${{ vars.ENABLE_DOCKERHUB_PUSH == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push GHCR multi-arch images
        if: ${{ vars.ENABLE_GHCR_PUSH == 'true' }}
        run: make docker-push-ghcr-multiarch VERSION=${{ github.ref_name }}

      - name: Build & push Docker Hub multi-arch images
        if: ${{ vars.ENABLE_DOCKERHUB_PUSH == 'true' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: make docker-push-dockerhub-multiarch VERSION=${{ github.ref_name }}
